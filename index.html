<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyper Battle Price Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0a0f1a;color:#e8e0d4;padding:20px;min-height:100vh}
h1{text-align:center;font-size:1.5em;color:#fff;margin-bottom:4px}
.subtitle{text-align:center;color:#8a8070;font-size:.85em;margin-bottom:20px}
.controls{max-width:960px;margin:0 auto 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.controls select,.controls input{background:#131a2e;border:1px solid #1e2d4a;color:#e8e0d4;padding:8px 12px;border-radius:6px;font-size:.85em}
.controls select:focus,.controls input:focus{outline:none;border-color:#d4a94c}
.controls label{color:#8a8070;font-size:.8em}
.view-toggle{display:flex;gap:4px}
.view-btn{background:#131a2e;border:1px solid #1e2d4a;color:#8a8070;padding:8px 12px;border-radius:6px;font-size:.85em;cursor:pointer;transition:all .15s}
.view-btn:hover{border-color:#4a4438}
.view-btn.active{background:#d4a94c22;border-color:#d4a94c;color:#d4a94c}
.grid{max-width:960px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.table-view{max-width:960px;margin:0 auto;display:none}
.table-view table{width:100%;border-collapse:collapse;background:#131a2e;border-radius:10px;overflow:hidden}
.table-view th,.table-view td{padding:10px 12px;text-align:left;border-bottom:1px solid #1e2d4a}
.table-view th{color:#8a8070;font-size:.8em;text-transform:uppercase;letter-spacing:1px;font-weight:500}
.table-view td{color:#e8e0d4;font-size:1em}
.table-view tr:last-child td{border-bottom:none}
.table-view tr:hover td{background:#1e2d4a22}
.table-view td.id{text-transform:uppercase;font-weight:600;color:#fff;width:60px}
.table-view td.name{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.table-view td.price{color:#d4a94c;font-weight:700;width:90px;text-align:right}
.table-view td.change{font-weight:500;width:70px;text-align:right}
.table-view td.change.up{color:#4a9e4e}
.table-view td.change.down{color:#c44d4d}
.table-view th.price{text-align:right;width:90px}
.table-view th.change{text-align:right;width:70px}
.table-view th.id{width:60px}
.card{background:#131a2e;border:1px solid #1e2d4a;border-radius:10px;overflow:hidden;transition:border-color .2s,transform .15s;cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column}
.card:hover{border-color:#d4a94c;transform:translateY(-2px)}
.card img{width:100%;border-radius:12px;display:block}
.card .info{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.card .card-id{font-size:.7em;color:#8a8070;text-transform:uppercase;letter-spacing:1px}
.card .card-name{font-size:.9em;font-weight:600;color:#fff;min-height:2.4em}
.card .card-price{font-size:1.1em;font-weight:700;color:#d4a94c}
.card .card-sales{font-size:.7em;color:#8a8070}
.card .no-sales{font-size:.8em;color:#4a4438;font-style:italic}
.footer{text-align:center;color:#4a4438;font-size:.7em;margin-top:32px}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .card .info{padding:8px 10px}
  h1{font-size:1.2em}
  .card .card-name{font-size:.8em}
  .card img{border-radius:6px}
  .table-view td.name{max-width:80px}
}
</style>
</head>
<body>

<h1>Hyper Battle Price Tracker</h1>
<p class="subtitle">Mercari Japan Sold Listings</p>

<div class="controls">
  <div>
    <label>Sort by</label>
    <select id="sortBy">
      <option value="id">Card ID</option>
      <option value="price-asc">Price ↑</option>
      <option value="price-desc">Price ↓</option>
      <option value="change-asc">% Change ↑</option>
      <option value="change-desc">% Change ↓</option>
    </select>
  </div>
  <div>
    <label>Filter</label>
    <input type="text" id="filterInput" placeholder="Card ID…">
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="gridBtn" aria-label="Grid view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <rect x="1" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="1" width="6" height="6" rx="1"/>
        <rect x="1" y="9" width="6" height="6" rx="1"/>
        <rect x="9" y="9" width="6" height="6" rx="1"/>
      </svg>
    </button>
    <button class="view-btn" id="tableBtn" aria-label="Table view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <rect x="1" y="2" width="14" height="2" rx="1"/>
        <rect x="1" y="6" width="14" height="2" rx="1"/>
        <rect x="1" y="10" width="14" height="2" rx="1"/>
        <rect x="1" y="14" width="14" height="2" rx="1"/>
      </svg>
    </button>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="table-view" id="tableView">
  <table>
    <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Change</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<p class="footer">Data sourced from Mercari Japan sold listings · Updated <span id="lastUpdate">—</span></p>

<script>
async function init() {
  const [cardsRes, salesRes] = await Promise.all([fetch('cards.json'), fetch('sales.json')]);
  const cardsData = await cardsRes.json();
  const allSales = await salesRes.json();
  const cards = cardsData.cards || cardsData;
  const cardList = Array.isArray(cards) ? cards : Object.values(cards);

  // Precompute price and % change per card
  const priceMap = {};
  const changeMap = {};
  const salesCountMap = {};
  cardList.forEach(c => {
    const allCardSales = allSales.filter(s => s.card_id === c.id);
    const gradeASales = allCardSales
      .filter(s => s.grade === 'A')
      .sort((a, b) => new Date(b.sold_date) - new Date(a.sold_date));
    salesCountMap[c.id] = allCardSales.length;
    
    if (gradeASales.length > 0) {
      // Determine window size
      const windowSize = gradeASales.length >= 20 ? 10 : (gradeASales.length >= 10 ? 5 : gradeASales.length);
      const recent = gradeASales.slice(0, windowSize);
      priceMap[c.id] = Math.round(recent.reduce((sum, s) => sum + s.price_jpy, 0) / recent.length);
      
      // Compute % change if enough data for comparison
      if (gradeASales.length >= windowSize * 2) {
        const prev = gradeASales.slice(windowSize, windowSize * 2);
        const prevAvg = prev.reduce((sum, s) => sum + s.price_jpy, 0) / prev.length;
        const pctChange = ((priceMap[c.id] - prevAvg) / prevAvg) * 100;
        // Only store if ≥±2%
        if (Math.abs(pctChange) >= 2) {
          changeMap[c.id] = pctChange;
        }
      }
    } else {
      priceMap[c.id] = null;
    }
  });

  let currentView = 'grid';

  function render(sortBy, filterText) {
    let filtered = cardList;
    if (filterText) {
      const q = filterText.toLowerCase();
      filtered = cardList.filter(c => c.id.toLowerCase().includes(q));
    }

    let sorted = [...filtered];
    if (sortBy === 'price-asc') {
      sorted.sort((a, b) => (priceMap[a.id] ?? Infinity) - (priceMap[b.id] ?? Infinity));
    } else if (sortBy === 'price-desc') {
      sorted.sort((a, b) => (priceMap[b.id] ?? -1) - (priceMap[a.id] ?? -1));
    } else if (sortBy === 'change-asc') {
      sorted.sort((a, b) => {
        const ca = changeMap[a.id] ?? -Infinity;
        const cb = changeMap[b.id] ?? -Infinity;
        return cb - ca;
      });
    } else if (sortBy === 'change-desc') {
      sorted.sort((a, b) => {
        const ca = changeMap[a.id] ?? Infinity;
        const cb = changeMap[b.id] ?? Infinity;
        return ca - cb;
      });
    } else {
      sorted.sort((a, b) => a.id.localeCompare(b.id));
    }

    // Render grid view
    const grid = document.getElementById('grid');
    grid.innerHTML = sorted.map(c => {
      const price = priceMap[c.id];
      const change = changeMap[c.id];
      const displayName = c.title?.en || c.name?.en || c.id.toUpperCase();
      
      let changeHtml = '';
      if (change != null) {
        const arrow = change > 0 ? '↑' : '↓';
        const color = change > 0 ? '#4a9e4e' : '#c44d4d';
        const formatted = (change > 0 ? '+' : '') + change.toFixed(1) + '%';
        changeHtml = ` <span style="color:${color};font-weight:500;font-size:.85em">${arrow}${formatted}</span>`;
      }
      
      return `<a href="card.html?id=${c.id}" class="card">
        <img src="images/${c.id}.png" alt="${c.id}" onerror="this.style.display='none'">
        <div class="info">
          <div class="card-id">${c.id.toUpperCase()}</div>
          <div class="card-name">${displayName}</div>
          ${price != null
            ? `<div class="card-price">¥${price.toLocaleString()}${changeHtml}</div>`
            : '<div class="no-sales">No sales data</div>'}
        </div>
      </a>`;
    }).join('');

    // Render table view
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = sorted.map(c => {
      const price = priceMap[c.id];
      const change = changeMap[c.id];
      const displayName = c.title?.en || c.name?.en || c.id.toUpperCase();
      
      let changeCell = '';
      if (change != null) {
        const arrow = change > 0 ? '↑' : '↓';
        const cls = change > 0 ? 'up' : 'down';
        const formatted = (change > 0 ? '+' : '') + change.toFixed(1) + '%';
        changeCell = `<td class="change ${cls}">${arrow}${formatted}</td>`;
      } else {
        changeCell = '<td class="change">—</td>';
      }
      
      return `<tr onclick="location.href='card.html?id=${c.id}'" style="cursor:pointer">
        <td class="id">${c.id.toUpperCase()}</td>
        <td class="name">${displayName}</td>
        ${price != null
          ? `<td class="price">¥${price.toLocaleString()}</td>`
          : '<td class="price">—</td>'}
        ${changeCell}
      </tr>`;
    }).join('');
  }

  function setView(view) {
    currentView = view;
    const grid = document.getElementById('grid');
    const tableView = document.getElementById('tableView');
    const gridBtn = document.getElementById('gridBtn');
    const tableBtn = document.getElementById('tableBtn');
    
    if (view === 'grid') {
      grid.style.display = 'grid';
      tableView.style.display = 'none';
      gridBtn.classList.add('active');
      tableBtn.classList.remove('active');
    } else {
      grid.style.display = 'none';
      tableView.style.display = 'block';
      gridBtn.classList.remove('active');
      tableBtn.classList.add('active');
    }
  }

  const sortEl = document.getElementById('sortBy');
  const filterEl = document.getElementById('filterInput');
  const gridBtn = document.getElementById('gridBtn');
  const tableBtn = document.getElementById('tableBtn');
  const update = () => render(sortEl.value, filterEl.value);
  sortEl.addEventListener('change', update);
  filterEl.addEventListener('input', update);
  gridBtn.addEventListener('click', () => setView('grid'));
  tableBtn.addEventListener('click', () => setView('table'));
  update();
  
  // Compute last update timestamp
  const timestamps = allSales.map(s => new Date(s.logged_at));
  if (timestamps.length) {
    const latest = new Date(Math.max(...timestamps));
    const formatted = latest.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    document.getElementById('lastUpdate').textContent = formatted;
  }
}

init();
</script>
</body>
</html>
